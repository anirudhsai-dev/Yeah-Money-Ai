name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
          - both

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Debug APK
        if: ${{ github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == 'both' || github.event_name == 'push' || github.event_name == 'pull_request' }}
        env:
          EXPO_PUBLIC_API_URL: https://yeahmoney-backend.onrender.com
        run: |
          chmod +x ./scripts/build-apk.sh
          export YM_JAVA_HOME=$JAVA_HOME
          npm run apk:debug

      - name: Build Release APK
        if: ${{ github.event.inputs.build_type == 'release' || github.event.inputs.build_type == 'both' }}
        env:
          EXPO_PUBLIC_API_URL: https://yeahmoney-backend.onrender.com
        run: |
          chmod +x ./scripts/build-apk.sh
          export YM_JAVA_HOME=$JAVA_HOME
          npm run apk:release

      - name: Upload Debug APK
        if: ${{ github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == 'both' || github.event_name == 'push' || github.event_name == 'pull_request' }}
        uses: actions/upload-artifact@v4
        with:
          name: YeahMoney-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        if: ${{ github.event.inputs.build_type == 'release' || github.event.inputs.build_type == 'both' }}
        uses: actions/upload-artifact@v4
        with:
          name: YeahMoney-Release-APK
          path: android/app/build/outputs/apk/release/app-release.apk
